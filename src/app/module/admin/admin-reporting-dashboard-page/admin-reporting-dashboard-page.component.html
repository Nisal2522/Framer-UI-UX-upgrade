    <div class="space-y-6">
      <header>
        <h1 class="text-3xl font-bold tracking-tight text-slate-900">Reporting dashboard</h1>
        <p class="mt-1 text-sm text-slate-600">GESI and inclusive monitoring using Angular + Chart.js.</p>
      </header>

      <section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <h2 class="text-sm font-semibold text-slate-900">Profiles — age × gender</h2>
        <div class="mt-3 h-72"><canvas baseChart [type]="'bar'" [data]="profileData" [options]="barOptions"></canvas></div>
      </section>

      <section class="grid gap-4 lg:grid-cols-2">
        <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <h2 class="text-sm font-semibold text-slate-900">Business plans — youth participation</h2>
          <div class="mt-3 h-72"><canvas baseChart [type]="'pie'" [data]="youthData" [options]="pieOptions"></canvas></div>
        </article>

        <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <h2 class="text-sm font-semibold text-slate-900">Assets — reporting by committee gender mix</h2>
          <div class="mt-3 h-72"><canvas baseChart [type]="'pie'" [data]="assetData" [options]="pieOptions"></canvas></div>
        </article>
      </section>

      <section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <h2 class="text-sm font-semibold text-slate-900">Training modules — uptake by gender</h2>
        <div class="mt-3 h-80"><canvas baseChart [type]="'bar'" [data]="trainingData" [options]="barOptions"></canvas></div>
      </section>
    </div>
