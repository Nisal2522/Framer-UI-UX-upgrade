    @if (open) {
      <div class="fixed inset-0 z-40 bg-black/40" (click)="close.emit()"></div>
      <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <section class="w-full max-w-lg rounded-xl bg-white p-6 shadow-lg">
          <header class="mb-4 flex items-center justify-between">
            <h3 class="text-lg font-semibold text-slate-900">{{ title }}</h3>
            <button type="button" class="text-slate-500 hover:text-slate-700" (click)="close.emit()">✕</button>
          </header>
          <ng-content></ng-content>
        </section>
      </div>
    }
